{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="profile-page py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold mb-1">My Profile</h2>
            <p class="text-muted mb-0">Manage your account details and verification.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="card profile-card shadow-lg border-0 rounded-4 overflow-hidden">
                    <div class="row g-0">

                        <!-- Sidebar -->
                        <div class="col-md-4 profile-sidebar p-4 text-white text-center">
                            <div class="profile-pic mb-3">
                                {% if user.profile_picture %}
                                    <img id="currentProfile" src="{{ user.profile_picture.url }}">
                                {% else %}
                                    <img id="currentProfile" src="https://img.icons8.com/ios-filled/150/ffffff/user-male-circle.png">
                                {% endif %}
                            </div>

                            <h5>{{ user.username }}</h5>
                            <small>{{ user.email }}</small>

                            <input type="file" id="profileInput" class="form-control mt-3">
                            <button id="cropBtn" class="btn btn-light mt-2" disabled>
                                Upload
                            </button>
                        </div>

                        <!-- Details -->
                        <div class="col-md-8 bg-white">
                            <div class="card-body p-4">

                                <form method="POST">
                                    {% csrf_token %}

                                    <input type="text" name="username" value="{{ user.username }}" class="form-control mb-3">

                                    <input type="text" name="contact_number" value="{{ user.contact_number }}" class="form-control mb-3">

                                    <input type="email" name="email" value="{{ user.email }}" class="form-control mb-3">

                                    <button class="btn btn-success">Save</button>
                                </form>

                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Cropper -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
<script src="{% static 'js/profile.js' %}"></script>

{% endblock %}
