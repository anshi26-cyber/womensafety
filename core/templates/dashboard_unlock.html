{% extends 'base.html' %}

{% block content %}
<div class="container py-5 passkey-page">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card passkey-card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-3 text-center">Enter Dashboard Passkey</h4>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} py-2 mb-2">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Passkey</label>
                            <input type="password" name="passcode" class="form-control passkey-input" placeholder="Enter passkey">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark passkey-btn">
                                Unlock Dashboard
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
