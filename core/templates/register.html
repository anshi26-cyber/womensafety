{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="register-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">

                        <h2 class="text-center fw-bold mb-2">Create Your Account</h2>
                        <p class="text-center text-muted small mb-4">
                            Sign up to use safety features.
                        </p>

                        <form method="POST" id="registerForm">
                            {% csrf_token %}

                            <input type="text" name="username" class="form-control custom-input mb-3" placeholder="Username" required>

                            <input type="email" name="email" class="form-control custom-input mb-3" placeholder="Email" required>

                            <input type="text" name="aadhaar_number" class="form-control custom-input mb-3" placeholder="Aadhaar" required>

                            <input type="text" name="contact_number" class="form-control custom-input mb-3" placeholder="Phone" required>

                            <input type="password" id="password" name="password" class="form-control custom-input mb-3" placeholder="Password" required>

                            <input type="password" id="confirm_password" class="form-control custom-input mb-2" placeholder="Confirm Password" required>

                            <small id="passwordHelp" class="text-danger d-none">Passwords do not match</small>

                            <button class="btn btn-blue w-100 mt-3">Register</button>

                        </form>

                        <p class="text-center mt-3 small">
                            Already have an account?
                            <a href="{% url 'login' %}" class="text-blue">Login</a>
                        </p>

                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="{% url 'home' %}" class="btn btn-outline-dark rounded-pill">
                        ⬅ Back
                    </a>
                </div>

            </div>
        </div>
    </div>
</section>

<!-- JS -->
<script src="{% static 'js/register.js' %}"></script>

{% endblock %}
