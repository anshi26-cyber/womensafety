{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- ✅ Wrapper div (IMPORTANT) -->
<div id="dashboard-root" 
     data-alerts='{{ panic_alerts_json|default:"[]"|escapejs }}'>

<section class="dashboard-section py-3">
  <div class="container-fluid">

    <!-- Top header -->
    <div class="dashboard-header card shadow-sm border-0 rounded-4 mb-3 px-3 px-md-4 py-3 bg-white d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
      <div>
        <h2 class="mb-1 fw-semibold dashboard-title">Emergency Panic Alerts Dashboard</h2>
        <p class="text-muted mb-0 small">Live locations, user profiles, and recent alerts for response teams.</p>
      </div>
      <div class="d-flex flex-wrap align-items-center gap-2">
        <span class="badge rounded-pill bg-danger-subtle text-danger small px-3 py-2">
          ● Live feed active
        </span>
        <span class="badge rounded-pill bg-secondary-subtle text-muted small px-3 py-2 d-flex align-items-center gap-1">
          <span class="dot"></span>
          Active alert marker
        </span>
      </div>
    </div>

    <div class="dashboard-body d-flex flex-column flex-lg-row gap-3">

      <!-- Map -->
      <div class="map-column card shadow-sm border-0 rounded-4 p-3 bg-white flex-grow-1 d-flex flex-column">

        <!-- Filters -->
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
          <div class="filters d-flex flex-wrap align-items-center gap-2">
            <label class="filter-label small text-muted">
              Start:
              <input id="filter-start" type="date" class="form-control form-control-sm date-input">
            </label>
            <label class="filter-label small text-muted">
              End:
              <input id="filter-end" type="date" class="form-control form-control-sm date-input">
            </label>
            <div class="form-check form-check-sm d-flex align-items-center">
              <input id="filter-verified" type="checkbox" class="form-check-input me-1">
              <label class="form-check-label small text-muted">
                Verified users only
              </label>
            </div>
          </div>

          <div class="d-flex flex-wrap align-items-center gap-2">
            <button id="apply-filters" class="btn btn-sm btn-outline-primary">Apply</button>
            <button id="clear-filters" class="btn btn-sm btn-outline-secondary">Clear</button>
            <button id="use-bounds" class="btn btn-sm btn-outline-dark">Use map bounds</button>
          </div>
        </div>

        <div id="map" class="flex-grow-1"></div>
      </div>

      <!-- History -->
      <aside class="history-column card shadow-sm border-0 rounded-4 bg-white">
        <div class="history-header d-flex flex-wrap justify-content-between align-items-center px-3 py-3 border-bottom">
          <div>
            <h3 class="mb-0 fw-semibold">Alert history</h3>
            <small class="text-muted">Most recent alerts, newest first.</small>
          </div>
          <div class="history-controls d-flex align-items-center gap-2 mt-2 mt-sm-0">
            <button id="prev-page" class="btn btn-sm btn-outline-secondary">Prev</button>
            <button id="next-page" class="btn btn-sm btn-outline-secondary">Next</button>
            <span id="page-info" class="small text-muted"></span>
          </div>
        </div>
        <div id="history-list" class="p-2"></div>
      </aside>

    </div>
  </div>
</section>

</div> <!-- ✅ Wrapper end -->

<!-- Toast -->
<div id="toast" class="toast-hide"></div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- Custom JS -->
<script src="{% static 'js/dashboard.js' %}"></script>

{% endblock %}
